<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Active Frame simple demo</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { background: #0a0a12; }
    canvas {display: block; width: 100%; height: 100vh; position: sticky; top: 0; left: 0; z-index: 1000;}

    input[type="range"] {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: calc(100% - 40px);
      height: 40px;
      background: #0a0a12;
      border: 1px solid #fff;
      border-radius: 5px;
      overflow: hidden;
      z-index: 1000;
     }

     #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      z-index: 1000;
     }

     body {
      height: 700vh;
      font-family: Arial, Helvetica, sans-serif;
     }

     #frame {
      position: fixed;
      bottom: 0;
      left: 0;
      background: black;
      color: #fff;
      font-size: 10px;
      font-weight: bold;
      padding: 4px;
      z-index: 1000;
     }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <h1 id="loading">Loading...</h1>
  <div id="frame"></div>

  <script type="module">
    import { attachCanvas } from './ActiveFrame.js';

    (async () => {
      if (history.scrollRestoration) {
        history.scrollRestoration = 'manual';
      }

      window.scrollTo(0, 0);

      const canvas = document.getElementById('canvas');
      const frameLabel = document.getElementById('frame');

      function checkSupport(codec) {
        return VideoDecoder.isConfigSupported({
          codec: codec === 'h264' ? 'avc1.42c033' : 'hvc1.1.6.L120.90',
        });
      }

      function showUnsupported() {
        document.getElementById('loading').innerHTML = 'Unsupported';
      }

      let portrait = window.innerWidth < window.innerHeight;
      let codec = 'h265';

      if (!('VideoDecoder' in window)) {
        return showUnsupported();
      }

      const [supportH265, supportH264] = await Promise.all([checkSupport('h265'), checkSupport('h264')]);

      if (!supportH265.supported && !supportH264.supported) {
        return showUnsupported();
      }

      if (supportH265.supported) {
        codec = 'h265';
      } else {
        codec = 'h264';
      }

      console.log(supportH265, supportH264);

      let hardwareAcceleration = 'prefer-hardware';

      if (/\bAndroid\b/i.test(navigator.userAgent)) {
        // The situation on android is very segmented
        // Certain hardware accelerated decoders are not efficient with random access
        // Need to find a better way to detect and degrade
        // file = 'assets/meridian_1k_h264.af';
        codec = 'h264';
        hardwareAcceleration = 'prefer-software';
      }

      let file = `assets/${portrait ? 'p_' : ''}meridian_${codec}.af`;

      const player = attachCanvas(canvas, file, {
        hardwareAcceleration,
        fit: 'cover',
        onDraw: () => {
          frameLabel.innerHTML = `Frame: ${player.getCurrentFrame()}`;
        },
      });

      await player.loading;
      document.getElementById('loading').style.display = 'none';
      player.setFrame(0);

      const totalFrames = player.getManifest().totalFrames;

      window.addEventListener('scroll', function() {
        const scrollPosition = window.scrollY;
        const totalHeight = document.body.scrollHeight;
        const viewportHeight = window.innerHeight;
        const progress = scrollPosition / (totalHeight - viewportHeight);
        const frame = Math.round(progress * (totalFrames - 1));
        player.setFrame(frame);
      });
    })();
  </script>
</body>
</html>
