<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ActiveFrame · Alpine demo</title>
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #0a0a12; color: #fff; font-family: Arial, Helvetica, sans-serif; }
      body { height: 700vh; }
      canvas { display: block; width: 100%; height: 100vh; position: sticky; top: 0; left: 0; z-index: 1000; background: #000; }
      #frame { position: fixed; bottom: 0; left: 0; background: #000; color: #fff; font-size: 10px; padding: 4px; z-index: 1000; }
    </style>
    <script>
      // Pick asset path before Alpine init.
      window.__activeframeSrc = (() => {
        const portrait = window.innerWidth < window.innerHeight;
        const codec = 'VideoDecoder' in window ? 'h265' : 'h264';
        return `/assets/${portrait ? 'p_' : ''}meridian_${codec}.af`;
      })();
      if (history.scrollRestoration) history.scrollRestoration = 'manual';
      window.scrollTo(0, 0);
    </script>
  </head>
  <body>
    <div
      x-data="activeframe({ src: window.__activeframeSrc, fit: 'cover' })"
      @scroll.window.passive="
        const total = instance?.manifest?.totalFrames;
        if (!total) return;
        const progress = window.scrollY / (document.body.scrollHeight - window.innerHeight);
        const n = Math.round(progress * (total - 1));
        setFrame(n);
        $refs.label.textContent = 'Frame: ' + n;
      "
    >
      <canvas
        x-ref="canvas"
        :width="window.innerWidth"
        :height="window.innerHeight"
      ></canvas>
      <div id="frame" x-ref="label"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
