<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ActiveFrame · React demo</title>
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #0a0a12; color: #fff; font-family: Arial, Helvetica, sans-serif; }
      body { height: 700vh; }
      #app canvas { display: block; width: 100%; height: 100vh; position: sticky; top: 0; left: 0; z-index: 1000; background: #000; }
      #frame { position: fixed; bottom: 0; left: 0; background: #000; color: #fff; font-size: 10px; padding: 4px; z-index: 1000; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="frame"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
